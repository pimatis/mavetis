name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build root entrypoint
        run: go build .

      - name: Benchmark hot paths
        if: runner.os != 'Windows'
        shell: bash
        run: go test -bench=. ./src/engine ./src/match

      - name: Parse Unix scripts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x install.sh package.sh
          bash -n install.sh
          bash -n package.sh

      - name: Parse PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          [void][System.Management.Automation.Language.Parser]::ParseFile('install.ps1',[ref]$null,[ref]$null)
